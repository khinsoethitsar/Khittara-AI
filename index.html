<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khittara AI</title>
    <script>
      // Early error logging to catch build/loading issues
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Boot Error:', msg, url, lineNo, columnNo, error);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="background:#0f172a;color:#f8fafc;padding:40px;font-family:sans-serif;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;">' +
            '<div style="max-width:600px;background:rgba(255,255,255,0.03);padding:40px;border-radius:32px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 20px 50px rgba(0,0,0,0.3);">' +
            '<h1 style="color:#eab308;margin-top:0;">Boot Error</h1>' +
            '<p style="color:#94a3b8;line-height:1.6;">ညီမလေးတို့ site တက်မလာဖြစ်နေပါတယ်ရှင်။ နည်းပညာပိုင်းဆိုင်ရာ အမှားတစ်ခုခုရှိနေပုံရပါတယ်ရှင်။ ✨💖</p>' +
            '<pre style="background:#05070a;padding:20px;border-radius:16px;overflow:auto;font-size:11px;margin-top:20px;color:#eab308;border:1px solid rgba(234,179,8,0.2);">' + msg + '\n' + url + ':' + lineNo + '</pre>' +
            '</div>' +
            '</div>';
        }
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
